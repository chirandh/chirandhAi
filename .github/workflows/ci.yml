name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Ruff
        run: ruff check app tests scripts

      - name: Pytest
        run: pytest -q

      - name: OpenAPI export
        run: python scripts/export_openapi.py | python -m json.tool > /tmp/openapi.json && test -s /tmp/openapi.json

      - name: Docker build API image
        run: docker build -f Dockerfile.api -t chirandhai-api:ci .

      - name: Docker build worker image
        run: docker build -f Dockerfile.worker -t chirandhai-worker:ci .

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Docker build web image
        run: docker build -f Dockerfile.web -t chirandhai-web:ci .
