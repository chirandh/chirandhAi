services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: staging
      API_KEYS: ${API_KEYS:-docker-dev-key}
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      # Presigned links must use a host the browser can open (Docker DNS name "minio" does not resolve on the host)
      S3_PRESIGN_ENDPOINT_URL: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: resume-artifacts
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123456
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - postgres
      - minio

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      ENVIRONMENT: staging
      API_KEYS: ${API_KEYS:-docker-dev-key}
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: resume-artifacts
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123456
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - postgres
      - minio

volumes:
  pgdata:
